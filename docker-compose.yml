services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: authdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@db:5432/authdb
      SECRET_KEY: "cambia-esto-por-algo-muy-secreto-en-produccion"
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ODOO_URL: "https://belenergy-prueba.odoo.com"
      ODOO_DB: "belenergy-prueba"
      ODOO_USER: "informatica@belenergy.com.ar"
      ODOO_PASSWORD: "819b754e5adfc18b54b7627ed1ddd6c3d1df06f8"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: