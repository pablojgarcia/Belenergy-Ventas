services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-appuser}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-apppassword}"
      POSTGRES_DB: "${POSTGRES_DB:-authdb}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-authdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-apppassword}@db:${DB_PORT:-5432}/${POSTGRES_DB:-authdb}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET es obligatorio en produccion}"
      ODOO_URL: "${ODOO_URL:-https://dev.odoo.com}"
      ODOO_DB: "${ODOO_DB:-dev}"
      ODOO_USER: "${ODOO_USER:-dev@example.com}"
      ODOO_PASSWORD: "${ODOO_PASSWORD:-dev-password}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: