name: CI/CD

on:
  push:
    branches: [main, deploy-pipeline]
  pull_request:
    branches: [main]

env:
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
          POSTGRES_DB: authdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d authdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r Backend/requirements.txt

      - name: Run backend unit tests
        working-directory: Backend
        env:
          DATABASE_URL: postgresql://appuser:apppassword@localhost:5432/authdb
          JWT_SECRET: test-secret-key
          ODOO_URL: http://localhost:8069
          ODOO_DB: test
          ODOO_USER: test
          ODOO_PASSWORD: test
        run: |
          python -m pytest tests/ -v --ignore=tests/test_api --ignore=tests/test_odoo_connection.py

  test-backend-api:
    runs-on: ubuntu-latest
    needs: test-backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
          POSTGRES_DB: authdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d authdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r Backend/requirements.txt
          playwright install chromium

      - name: Start backend server
        env:
          DATABASE_URL: postgresql://appuser:apppassword@localhost:5432/authdb
          JWT_SECRET: test-secret-key
          ODOO_URL: http://localhost:8069
          ODOO_DB: test
          ODOO_USER: test
          ODOO_PASSWORD: test
        run: |
          cd Backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Run Playwright API tests
        working-directory: Backend
        env:
          DATABASE_URL: postgresql://appuser:apppassword@localhost:5432/authdb
          JWT_SECRET: test-secret-key
          ODOO_URL: http://localhost:8069
          ODOO_DB: test
          ODOO_USER: test
          ODOO_PASSWORD: test
        run: |
          python -m pytest tests/test_api/ -v

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: Ventas
        run: flutter pub get

      - name: Run Flutter tests
        working-directory: Ventas
        run: flutter test

      - name: Build Flutter web
        working-directory: Ventas
        run: flutter build web --release

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend-api, test-frontend]
    if: github.ref == 'refs/heads/main'

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        working-directory: Backend
        run: railway up --service=5d43e2cd-eb5b-4b81-adc8-9c5026e40d74 --detach --json --yes

      - name: Deploy frontend
        working-directory: Ventas
        run: railway up --service=04cda778-1a46-4782-af83-7507ba4c1eab --detach --json --yes
