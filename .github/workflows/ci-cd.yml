name: CI/CD

on:
  push:
    branches: [main, deploy-pipeline]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
          POSTGRES_DB: authdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d authdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r Backend/requirements.txt

      - name: Run backend unit tests
        working-directory: Backend
        env:
          DATABASE_URL: postgresql://appuser:apppassword@localhost:5432/authdb
          JWT_SECRET: test-secret-key
          ODOO_URL: http://localhost:8069
          ODOO_DB: test
          ODOO_USER: test
          ODOO_PASSWORD: test
        run: |
          python -m pytest tests/ -v --ignore=tests/test_api --ignore=tests/test_odoo_connection.py

  test-backend-api:
    runs-on: ubuntu-latest
    needs: test-backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
          POSTGRES_DB: authdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U appuser -d authdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r Backend/requirements.txt
          playwright install chromium

      - name: Start backend server
        env:
          DATABASE_URL: postgresql://appuser:apppassword@localhost:5432/authdb
          JWT_SECRET: test-secret-key
          ODOO_URL: http://localhost:8069
          ODOO_DB: test
          ODOO_USER: test
          ODOO_PASSWORD: test
        run: |
          cd Backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Run Playwright API tests
        working-directory: Backend
        env:
          DATABASE_URL: postgresql://appuser:apppassword@localhost:5432/authdb
          JWT_SECRET: test-secret-key
          ODOO_URL: http://localhost:8069
          ODOO_DB: test
          ODOO_USER: test
          ODOO_PASSWORD: test
        run: |
          python -m pytest tests/test_api/ -v

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: Ventas
        run: flutter pub get

      - name: Run Flutter tests
        working-directory: Ventas
        run: flutter test

      - name: Build Flutter web
        working-directory: Ventas
        run: flutter build web --release --dart-define=SAME_ORIGIN=true

  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend-api, test-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        working-directory: Ventas
        run: flutter build web --release --dart-define=SAME_ORIGIN=true

      - name: Copy Flutter build to backend
        run: cp -r Ventas/build/web/. Backend/static/

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
