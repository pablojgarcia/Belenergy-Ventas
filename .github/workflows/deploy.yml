name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_URL: https://solarapp-production-e35a.up.railway.app

jobs:
  frontend:
    name: Frontend → Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable

      - name: Build Flutter web
        run: |
          cd Ventas
          flutter build web --release --dart-define=API_URL=$API_URL

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy Ventas/build/web --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'ventas' }}

  backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --yes --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
