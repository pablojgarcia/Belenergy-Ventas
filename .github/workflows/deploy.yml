name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_URL: https://solarapp-production-e35a.up.railway.app

jobs:
  frontend:
    name: Frontend → Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        run: |
          git clone --depth 1 https://github.com/flutter/flutter.git -b stable _flutter
          echo "$PWD/_flutter/bin" >> $GITHUB_PATH
          "$PWD/_flutter/bin/flutter" config --enable-web

      - name: Build Flutter web
        run: |
          cd Ventas
          flutter build web --release --dart-define=API_URL=$API_URL

      - name: Debug - List Pages projects
        run: |
          npm i -g wrangler
          wrangler pages project list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: |
          wrangler pages deploy Ventas/build/web --project-name=ventas
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --yes --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
