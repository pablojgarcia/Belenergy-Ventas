name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  API_URL: https://solarapp-production-e35a.up.railway.app

jobs:
  frontend:
    name: Frontend → Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        run: |
          git clone --depth 1 https://github.com/flutter/flutter.git -b stable _flutter
          echo "$PWD/_flutter/bin" >> $GITHUB_PATH
          "$PWD/_flutter/bin/flutter" config --enable-web

      - name: Build Flutter web
        run: |
          cd Ventas
          flutter build web --release --dart-define=API_URL=$API_URL

      - name: Deploy to Cloudflare Workers
        run: |
          wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  backend:
    name: Backend → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --yes --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
